# LeafBridge local development stack (EMR-773)
#
# Brings the full dev stack online so a fresh clone can hit the
# 30-minute developer promise:
#   1. Ingest a synthetic patient
#   2. Normalize data to FHIR
#   3. Query the patient record
#   4. Run an AI summary agent
#   5. See the full audit trail
#
# Component versions are pinned. Bump in a single PR with a changelog.

services:
  # --- Layer 1: FHIR + persistence ---

  fhir-server:
    image: hapiproject/hapi:v7.6.0
    container_name: leafbridge-fhir
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.fhir_version=R4
      - hapi.fhir.allow_external_references=true
      - hapi.fhir.bulk_export_enabled=true
      - spring.datasource.url=jdbc:postgresql://postgres:5432/hapi
      - spring.datasource.username=leafbridge
      - spring.datasource.password=leafbridge_dev
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: leafbridge-postgres
    environment:
      - POSTGRES_USER=leafbridge
      - POSTGRES_PASSWORD=leafbridge_dev
      - POSTGRES_DB=leafbridge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leafbridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2026-01-15T00-00-00Z
    container_name: leafbridge-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=leafbridge
      - MINIO_ROOT_PASSWORD=leafbridge_dev_minio
    volumes:
      - minio-data:/data

  # --- Layer 3: Trust (identity, policy) ---

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: leafbridge-keycloak
    command: start-dev --http-port=8081
    ports:
      - "8081:8081"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin_dev
    depends_on:
      postgres:
        condition: service_healthy

  opa:
    image: openpolicyagent/opa:1.0.0-rootless
    container_name: leafbridge-opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ../../services/policy-gateway/policies:/policies:ro

  vault:
    image: hashicorp/vault:1.18
    container_name: leafbridge-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=leafbridge_dev_root
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200

  # --- Layer 2: Lakehouse adjuncts ---

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: leafbridge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.10
    container_name: leafbridge-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"

  # --- Layer 4: Orchestration ---

  temporal:
    image: temporalio/auto-setup:1.25.0
    container_name: leafbridge-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=leafbridge
      - POSTGRES_PWD=leafbridge_dev
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.30.0
    container_name: leafbridge-temporal-ui
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # --- Telemetry ---

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: leafbridge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.4.0
    container_name: leafbridge-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin_dev

volumes:
  postgres-data:
  minio-data:
  qdrant-data:
