name: Staging & Production Pipeline

on:
  push:
    branches:
      - main

# Newer pushes to main supersede in-flight runs. Without this, every push
# queues a fresh run behind the Staging environment approval gate; we hit
# 67 stale runs piled up for 65+ hours on 2026-05-24 before catching it.
concurrency:
  group: staging-to-prod
  cancel-in-progress: true

# Pipeline contract:
#   verify → deploy_staging → test_staging → deploy_production
#
# Production only ships when every preceding job is green. The previous
# arrangement had a separate `deploy-production.yml` that fired in
# parallel with this pipeline on every push to main — meaning prod went
# out regardless of staging, typecheck, lint, or Playwright. That
# workflow is removed in this commit.
jobs:
  verify:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  deploy_staging:
    name: Deploy to Staging
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: Staging
    steps:
      - name: Trigger Render Staging Deploy
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}
          method: 'POST'
          customHeaders: '{"Content-Type": "application/json"}'
          timeout: '60000'

      - name: Wait for staging /api/health to report this commit
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Poll /api/health until commit == github.sha. This replaces the
          # old "sleep 180" which raced the Render build and made every
          # deploy a coin flip. Hard cap at ~12 minutes to avoid hung jobs.
          MAX_ATTEMPTS=72   # 72 * 10s = 12 minutes
          INTERVAL=10
          ATTEMPT=0
          LAST_COMMIT=""

          echo "Waiting for staging to report commit ${EXPECTED_SHA}..."
          while [ "${ATTEMPT}" -lt "${MAX_ATTEMPTS}" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            BODY="$(curl -fsS --max-time 8 "${STAGING_URL%/}/api/health" || true)"
            if [ -n "${BODY}" ]; then
              LAST_COMMIT="$(printf '%s' "${BODY}" | jq -r '.commit // empty' 2>/dev/null || true)"
              if [ "${LAST_COMMIT}" = "${EXPECTED_SHA}" ]; then
                echo "Staging is on ${EXPECTED_SHA} (attempt ${ATTEMPT})."
                exit 0
              fi
            fi
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: live commit=${LAST_COMMIT:-<none>}; sleeping ${INTERVAL}s..."
            sleep "${INTERVAL}"
          done

          echo "::error::Staging did not report commit ${EXPECTED_SHA} after $((MAX_ATTEMPTS * INTERVAL))s. Last seen: ${LAST_COMMIT:-<none>}."
          exit 1

  test_staging:
    name: Automated Tests (Staging)
    needs: deploy_staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
