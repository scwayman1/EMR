name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Next.js build doesn't hit the DB, but Prisma needs *something* to
      # resolve the datasource URL at generate time. A placeholder is fine.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci
      # Iron-session requires a secret at import-time in some configs.
      SESSION_SECRET: ci-placeholder-secret-value-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
