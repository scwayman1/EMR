name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Next.js build doesn't hit the DB, but Prisma needs *something* to
      # resolve the datasource URL at generate time. A placeholder is fine.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci
      # Iron-session requires a secret at import-time in some configs.
      SESSION_SECRET: ci-placeholder-secret-value-at-least-32-chars

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Lint specialty manifests
        run: npm run manifests:lint

      # Vitest unit + integration tests. Previously CI ran typecheck +
      # lint + build but NOT the test suite — a material gap for a
      # healthcare/commerce codebase (see EMR-763). Running the suite
      # here surfaces regressions on every PR so test debt can't grow
      # silently. Local: `npm test` (vitest run).
      - name: Tests (vitest)
        run: npm test

      - name: Build
        run: npm run build

      # Soft guard against `any` regression. The codebase tolerates a
      # known volume today (~450 hits, EMR-763); this step prints the
      # current count so PR reviewers see the delta. Flip to a hard
      # threshold once the count is meaningfully reduced.
      - name: any-usage budget (informational)
        if: always()
        run: |
          count=$(grep -rE ":\s*any\b|<any>|as any\b" src/ \
            --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | tr -d ' ')
          echo "TypeScript \`any\` count: $count (target: <100; see EMR-763)"
          echo "any_count=$count" >> $GITHUB_OUTPUT

      # Audit-log coverage on mutating API routes (EMR-779 #20). Today's
      # baseline: ~76/86 mutation routes are missing `auditLog.create`.
      # The step is informational so the count is visible on every PR;
      # flip to `--strict` once the backlog is closed.
      - name: audit-log coverage (informational)
        if: always()
        run: npm run lint:audit
