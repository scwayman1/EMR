services:
  - type: web
    name: emr-web
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Supabase Postgres. Paste in Render's env UI.
      # DATABASE_URL = pooler (transaction mode, port 6543) for runtime.
      # DIRECT_URL   = direct (port 5432) for `prisma migrate deploy`.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      # Supabase Storage (for document uploads).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: documents
      - key: SESSION_SECRET
        generateValue: true
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: emr-agent-worker
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: documents
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: emr-scheduler
    env: node
    schedule: "*/15 * * * *"
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/workers/scheduler.ts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
