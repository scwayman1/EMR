services:
  # -----------------------------------------------------------------
  # Web — Next.js app (UI, API routes, server actions)
  # -----------------------------------------------------------------
  - type: web
    name: emr-web
    env: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    # preDeploy runs once per deploy, before the new version goes live.
    # - db push syncs the Prisma schema to Postgres (no migration files needed for V1)
    # - db:seed is idempotent (upserts) — safe to run on every deploy
    preDeployCommand: npx prisma db push --accept-data-loss && npm run db:seed
    # Belt-and-suspenders: also push the schema at start-time. Render's
    # preDeployCommand is not guaranteed to run on every plan/config, and when
    # it silently skips, new models (e.g. LabResult, RefillRequest) never hit
    # the database — which takes down the clinician layout on the next login.
    startCommand: npx prisma db push --accept-data-loss --skip-generate && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AGENT_MODEL_CLIENT
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: OPENROUTER_FREE_MODEL
        value: google/gemma-2-9b-it:free
      - key: OPENROUTER_APP_NAME
        value: Leafjourney
      # Supabase Storage (for document uploads)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: documents
      # Payment gateway — defaults to "stub" until Payabli credentials are wired
      - key: PAYMENT_GATEWAY
        value: stub
      - key: PAYABLI_API_TOKEN
        sync: false
      - key: PAYABLI_ENTRY_POINT
        sync: false
      - key: PAYABLI_ENVIRONMENT
        value: sandbox
      - key: PAYABLI_WEBHOOK_SECRET
        sync: false

  # -----------------------------------------------------------------
  # Worker — long-running agent runner
  # -----------------------------------------------------------------
  - type: worker
    name: emr-agent-worker
    env: node
    plan: starter
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: AGENT_MODEL_CLIENT
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: OPENROUTER_FREE_MODEL
        value: google/gemma-2-9b-it:free
      - key: OPENROUTER_APP_NAME
        value: Leafjourney

  # -----------------------------------------------------------------
  # Scheduler — cron that enqueues recurring workflows
  # -----------------------------------------------------------------
  - type: cron
    name: emr-scheduler
    env: node
    schedule: "*/15 * * * *"
    buildCommand: npm ci && npx prisma generate
    startCommand: npx tsx src/workers/scheduler.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString

databases:
  - name: emr-postgres
    # basic-256mb is the cheapest currently-supported Render Postgres plan.
    # Legacy names like `starter` are no longer accepted for new databases.
    plan: basic-256mb
    databaseName: emr
    user: emr
