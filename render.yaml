services:
  # -----------------------------------------------------------------
  # Web — Next.js app (UI, API routes, server actions)
  # -----------------------------------------------------------------
  - type: web
    name: emr-web
    env: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npm run build
    # preDeploy runs once per deploy, before the new version goes live.
    # - db push syncs the Prisma schema to Postgres (no migration files needed for V1)
    # - db:seed is idempotent (upserts) — safe to run on every deploy
    preDeployCommand: npx prisma db push --accept-data-loss && npm run db:seed
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  # -----------------------------------------------------------------
  # Worker — long-running agent runner
  # -----------------------------------------------------------------
  - type: worker
    name: emr-agent-worker
    env: node
    plan: starter
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  # -----------------------------------------------------------------
  # Scheduler — cron that enqueues recurring workflows
  # -----------------------------------------------------------------
  - type: cron
    name: emr-scheduler
    env: node
    schedule: "*/15 * * * *"
    buildCommand: npm ci && npx prisma generate
    startCommand: npx tsx src/workers/scheduler.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString

databases:
  - name: emr-postgres
    plan: starter
    databaseName: emr
    user: emr
