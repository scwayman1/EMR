
# Render deploy pipeline — kept deliberately small.
#
# Rules of the road:
#   1. `main` is the only branch that deploys. Open PRs into main; never
#      point a Render service at a feature branch.
#   2. Schema sync happens in `startCommand`, right before the app starts
#      serving traffic. No reliance on preDeployCommand (it's a no-op on
#      Starter and failed silently for weeks).
#   3. Seeding is a one-off, not part of every deploy. Run `npm run db:seed`
#      manually from a Render shell when spinning up a fresh database.

services:
  # Web — the Next.js app (UI, API routes, server actions).
  - type: web
    name: emr-web
    env: node
    plan: starter
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss --skip-generate && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AGENT_MODEL_CLIENT
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: OPENROUTER_FREE_MODEL
        value: google/gemma-2-9b-it:free
      - key: OPENROUTER_APP_NAME
        value: Leafjourney
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: documents
      - key: PAYMENT_GATEWAY
        value: stub
      - key: PAYABLI_API_TOKEN
        sync: false
      - key: PAYABLI_ENTRY_POINT
        sync: false
      - key: PAYABLI_ENVIRONMENT
        value: sandbox
      - key: PAYABLI_WEBHOOK_SECRET
        sync: false

  # Worker — processes the AgentJob queue. Pinned to main.
  - type: worker
    name: emr-agent-worker
    env: node
    plan: starter
    branch: main
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: AGENT_MODEL_CLIENT
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: OPENROUTER_FREE_MODEL
        value: google/gemma-2-9b-it:free
      - key: OPENROUTER_APP_NAME
        value: Leafjourney

  # Scheduler — enqueues recurring workflows every 15 minutes. Pinned to main.
  - type: cron
    name: emr-scheduler
    env: node
    branch: main
    schedule: "*/15 * * * *"
    buildCommand: npm ci && npx prisma generate
    startCommand: npx tsx src/workers/scheduler.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString

databases:
  - name: emr-postgres
    plan: basic-256mb
    databaseName: emr
    user: emr
