services:
  - type: web
    name: emr-web
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: emr-agent-worker
    env: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString
      - key: AGENT_MODEL_CLIENT
        value: stub
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: emr-scheduler
    env: node
    schedule: "*/15 * * * *"
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/workers/scheduler.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emr-postgres
          property: connectionString

databases:
  - name: emr-postgres
    plan: starter
    databaseName: emr
    user: emr
